name: mcp_agent_gateway_local

services:
  fastapi:
    build:
      context: .
      dockerfile: ./compose/local/fastapi/Dockerfile
    image: mcp_agent_gateway_local_fastapi
    container_name: mcp_agent_gateway_local_fastapi
    volumes:
      - .:/app:z
    env_file:
      - path: ./.env
        required: false
    environment:
      # Intra-network overrides — inside the container "localhost" is the container
      # itself, not another service. Use compose service names.
      REDIS_URL: redis://valkey:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      # NOTE (Keycloak hostname): the token `iss` claim must equal OAUTH_ISSUER_URL.
      # With `start-dev` the issuer is request-host derived. To reach Keycloak from
      # this container AND keep issuers consistent, add `127.0.0.1 keycloak` to your
      # host /etc/hosts and set OAUTH_ISSUER_URL=http://keycloak:8080/realms/mcp-gateway.
    ports:
      - "8000:8000"
    command: /start
    depends_on:
      valkey:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  valkey:
    image: valkey/valkey:8-alpine
    container_name: mcp_agent_gateway_local_valkey
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: mcp_agent_gateway_local_keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    command: start-dev
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # OTLP trace collector + UI (http://localhost:16686). Target for the gateway's
  # OpenTelemetry export; tracing degrades gracefully if this service is absent.
  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: mcp_agent_gateway_local_jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"
