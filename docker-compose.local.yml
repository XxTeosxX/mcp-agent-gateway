name: mcp_agent_gateway_local

services:
  fastapi:
    build:
      context: .
      dockerfile: ./compose/local/fastapi/Dockerfile
    image: mcp_agent_gateway_local_fastapi
    container_name: mcp_agent_gateway_local_fastapi
    volumes:
      - .:/app:z
    env_file:
      - path: ./.env
        required: false
    ports:
      - "8000:8000"
    command: /start
    depends_on:
      valkey:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  valkey:
    image: valkey/valkey:8-alpine
    container_name: mcp_agent_gateway_local_valkey
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: mcp_agent_gateway_local_keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    command: start-dev
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
